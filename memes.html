/* ===========================
   MEME POPUP - FIXED CENTERING
=========================== */

.popup-overlay{
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,.85);
    backdrop-filter: blur(6px);
    z-index: 99999;
    
    /* YE IMPORTANT HAI - CENTER KARNE KE LIYE */
    display: flex !important;
    justify-content: center;
    align-items: center;
}

/* Jab hide ho to display none */
.popup-overlay.hidden {
    display: none !important;
}

.popup-box{
    width: 90%;
    max-width: 850px;
    height: 80vh;
    background: #111c2e;
    border: 1px solid #223553;
    border-radius: 18px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    
    /* Shadow add kiya better look ke liye */
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
}

.popup-top{

    justify-content: space-between;
    align-items: center;
    padding: 20px;

}

.close-popup{

<body>

<div class="container">

<div class="heading">

<h1> CORPORATE ZONE 😂 </h1>

<p> REALITY-MEMES-CAREER TRUTH.</p>

</div>

<div class="grid" id="gridContainer">
    <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px;">
        <div class="loader"></div>
        <p style="color: #10b981; margin-top: 20px; font-size: 25px;">⏳Loading Categories...</p>
            </div>
</div>

<div class="grid">
    <!-- Categories automatically load honge -->
</div>

</div>
<!-- ================= MEME POPUP ================= -->

<div id="memePopup" class="popup-overlay hidden">

    <div class="popup-box">

        <div class="popup-top">

            <h2 id="popupTitle">Category</h2>

            <button class="close-popup" onclick="closePopup()">
                ✕
            </button>

        </div>

        <div id="memeContainer">

        </div>

        <div class="load-btn-area">

            <button id="loadMoreBtn" onclick="loadMore()">
                Load More
            </button>

        </div>

    </div>

</div>

<script>

// ==============================
// Meme Data (Excel/Google Sheets)
// ==============================

let memeData = {};
let isDataLoaded = false; // ✅ ADD KARO YEH LINE

const API_URL = "https://script.google.com/macros/s/AKfycbwuEZWvn8bRBC0nOY7ON1DcILqCmbm4m6--TqNhswplku9fjhJfcz_qSpHcRjOrWxFTnw/exec";

// ✅ CHANGE: Page load ke baad fetch karo
window.addEventListener("DOMContentLoaded", function(){
    console.log("⏳ Loading memes from Excel...");
    
    fetch(API_URL)
      .then(response => response.json())
      .then(data => {
          memeData = data;
          isDataLoaded = true; // ✅ Mark as loaded
          console.log("✅ Memes loaded!", memeData);
          generateCategoryGrid(); // ✅ Categories generate karo
      })
      .catch(error => {
          console.error("❌ Error:", error);
      });
});

// ✅ ADD: Categories dynamically banao
function generateCategoryGrid() {
    const grid = document.querySelector(".grid");
    
    if (!grid) return;
    
    grid.innerHTML = "";
    
    const categories = Object.keys(memeData);
    
    categories.forEach(category => {
        const memeCount = memeData[category].length;
        
        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => openPopup(category);
        
        card.innerHTML = `
            <div class="icon">📝</div>
            <h3>${category}</h3>
            <span>${memeCount} Memes</span>
        `;
        
        grid.appendChild(card);
    });
}

let currentCategory = "";
let currentIndex = 0;
const perPage = 5;

function openPopup(category){
    if (!isDataLoaded) {
        alert("Data loading, please wait...");
        return;
    }
    
    currentCategory = category;
    currentIndex = 0;
    document.getElementById("popupTitle").innerText = category;
    document.getElementById("memeContainer").innerHTML = "";
    document.getElementById("memePopup").classList.remove("hidden");
    loadMore();
}

function loadMore(){
    const container = document.getElementById("memeContainer");
    const list = memeData[currentCategory] || [];
    const end = Math.min(currentIndex + perPage, list.length);
    
    for(let i = currentIndex; i < end; i++){
        const memeDiv = document.createElement("div");
        memeDiv.className = "meme-card";
        memeDiv.textContent = list[i];
        container.appendChild(memeDiv);
    }
    
    currentIndex = end;
    
    if(currentIndex >= list.length){
        document.getElementById("loadMoreBtn").style.display = "none";
    } else {
        document.getElementById("loadMoreBtn").style.display = "inline-block";
    }
}

function closePopup(){
    document.getElementById("memePopup").classList.add("hidden");
}

document.getElementById("memePopup").addEventListener("click", function(e){
    if(e.target === this) {
        closePopup();
    }
});
</script>
