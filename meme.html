<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Browse Memes</title><link rel="stylesheet" href="style.css"></head><body style="background:#0b1220;color:#fff;font-family:Arial;padding:30px"><h1>😂 Browse Memes</h1><div class="grid"><div class="card" onclick="openMemePopup('Office Memes')">Office Memes</div><div class="card" onclick="openMemePopup('Corporate Confessions')">Corporate Confessions</div><div class="card" onclick="openMemePopup('Toxic Boss')">Toxic Boss</div><div class="card" onclick="openMemePopup('Office Politics')">Office Politics</div><div class="card" onclick="openMemePopup('HR')">HR</div><div class="card" onclick="openMemePopup('Manager')">Manager</div><div class="card" onclick="openMemePopup('Salary')">Salary</div><div class="card" onclick="openMemePopup('Appraisal')">Appraisal</div><div class="card" onclick="openMemePopup('Promotion')">Promotion</div><div class="card" onclick="openMemePopup('Layoffs')">Layoffs</div><div class="card" onclick="openMemePopup('Work From Home')">Work From Home</div><div class="card" onclick="openMemePopup('Meetings')">Meetings</div><div class="card" onclick="openMemePopup('Resignation')">Resignation</div></div><div id="popup" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8)"><div style="max-width:700px;margin:40px auto;background:#111;padding:20px;height:80vh;overflow:auto"><h2 id="title"></h2><div id="list"></div><button onclick="loadMore()">Load More</button><button onclick="closePopup()">Close</button></div></div><script>
let count=5,current='';
function openMemePopup(c){current=c;count=5;document.getElementById('title').innerText=c+' Memes';render();popup.style.display='block'}
function render(){let l=document.getElementById('list');l.innerHTML='';for(let i=1;i<=count;i++){l.innerHTML+=`<div style="border:1px solid #333;padding:15px;margin:10px 0;border-radius:10px">🖼️ ${current} Meme ${i}<br><small>Backend (Apps Script) se baad me aayega.</small></div>`}}
function loadMore(){count+=5;render()}
function closePopup(){popup.style.display='none'}
</script></body></html>
